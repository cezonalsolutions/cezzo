<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Orders</title>

<style>
body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#f7f8fa;
font-family:Segoe UI,sans-serif;
}

button{
padding:16px 40px;
border:none;
border-radius:35px;
background:#111;
color:white;
font-size:18px;
cursor:pointer;
}
</style>
</head>
<body>

<button onclick="logout()">Logout</button>

<script>

function logout(){

 // clear login details
 localStorage.removeItem("userName");
 localStorage.removeItem("userMobile");

 // skip splash once after logout
 sessionStorage.setItem("skipIntro","true");

 window.location.href="index.html";
}
</script>

</body>
</html>
