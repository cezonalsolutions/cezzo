<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,initial-scale=1.0">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html,
body{
  width:100%;
  overflow-x:hidden;
  background:#f6f7fb;
  font-family:Segoe UI,sans-serif;
}

/* 🔥 HEADER */

.header{

  position:sticky;
  top:0;
  z-index:100;

  display:flex;
  align-items:center;
  gap:12px;

  padding:
  calc(48px + env(safe-area-inset-top))
  16px
  16px;

  background:#fff;

  box-shadow:
  0 4px 14px rgba(0,0,0,.05);
}

.backBtn{

  width:38px;
  height:38px;

  border-radius:50%;

  display:flex;
  align-items:center;
  justify-content:center;

  background:#f3f4f6;

  font-size:15px;
}

.headerTitle{

  font-size:19px;
  font-weight:700;
  color:#111;
}

/* 🔥 CONTAINER */

.container{

  width:100%;

  padding:16px;
  padding-bottom:120px;
}

/* 🔥 MENU */

.accountMenu{

  display:flex;
  flex-direction:column;
  gap:14px;
}

/* 🔥 CARD */

.menuCard{

  width:100%;

  background:#fff;

  border-radius:18px;

  padding:18px 16px;

  display:flex;
  align-items:center;
  justify-content:space-between;

  box-shadow:
  0 4px 14px rgba(0,0,0,.05);

  cursor:pointer;

  transition:.2s ease;
}

.menuCard:active{

  transform:scale(.985);
}

/* 🔥 LEFT */

.menuLeft{

  display:flex;
  align-items:center;
  gap:14px;

  min-width:0;
}

/* 🔥 ICON BOX */

.menuLeft i{

  width:42px;
  height:42px;

  border-radius:14px;

  background:#f3f4f6;

  display:flex;
  align-items:center;
  justify-content:center;

  color:#111;

  font-size:16px;

  flex-shrink:0;
}

/* 🔥 TEXT */

.menuLeft span{

  font-size:15px;
  font-weight:600;
  color:#111;

  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

/* 🔥 RIGHT */

.menuCard .fa-chevron-right{

  color:#9ca3af;
  font-size:14px;
  flex-shrink:0;
}

/* 🔥 ORDERS */

#ordersSection{

  display:none;
}

/* 🔥 ORDER CARD */

.orderCard{

  background:#fff;

  border-radius:18px;

  padding:16px;

  margin-bottom:16px;

  box-shadow:
  0 4px 14px rgba(0,0,0,.05);
}

/* 🔥 ORDER TOP */

.orderTop{

  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  gap:12px;
}

/* 🔥 ORDER PRICE */

.orderPrice{

  color:#16a34a;
  font-weight:700;
  font-size:15px;
}

/* 🔥 ITEMS */

.itemRow{

  display:flex;
  align-items:center;
  gap:12px;

  margin-top:14px;
}

.itemImg{

  width:60px;
  height:60px;

  border-radius:14px;

  object-fit:cover;

  flex-shrink:0;

  background:#eee;
}

/* 🔥 ITEM TEXT */

.itemName{

  font-size:14px;
  font-weight:600;
  color:#111;
}

.itemQty{

  margin-top:3px;

  font-size:12px;
  color:#6b7280;
}

/* 🔥 SEE MORE */

.seeMore{

  margin-top:12px;

  color:#2563eb;

  font-size:13px;
  font-weight:600;
}

/* 🔥 STATUS */

.statusText{

  margin-top:8px;

  font-size:13px;
  font-weight:600;

  color:#16a34a;
}

/* 🔥 POPUP */

#orderPopup{

  position:fixed;
  inset:0;

  background:#fff;

  z-index:9999;

  overflow-y:auto;

  display:none;
}

/* 🔥 POPUP HEADER */
@keyframes popupIn{

  from{

    opacity:0;
    transform:scale(.9);

  }

  to{

    opacity:1;
    transform:scale(1);

  }

}

.popupHeader{

  position:sticky;
  top:0;
  z-index:20;

  background:#fff;

  display:flex;
  align-items:center;
  gap:12px;

  padding:
  calc(48px + env(safe-area-inset-top))
  16px
  16px;

  border-bottom:1px solid #eee;
}

/* 🔥 FLOW LOADER */

.loaderWrap{

  position:fixed;
  inset:0;

  background:transparent;

  backdrop-filter:blur(10px);

  -webkit-backdrop-filter:blur(10px);

  display:flex;
  align-items:center;
  justify-content:center;

  z-index:99999;

  overflow:hidden;
}

/* 🔥 FULL WIDTH */

.flowLoader{

  position:relative;

  width:100vw;

  height:90px;

  overflow:hidden;
}

/* 🔥 ICON */

.flowIcon{

  position:absolute;

  top:50%;

  left:-60px;

  transform:translateY(-50%);

  font-size:34px;

  color:#2874f0;

  opacity:0;

  text-shadow:
  0 0 10px rgba(40,116,240,.35),
  0 0 20px rgba(40,116,240,.2);

  animation:
  flowMove 1.1s linear infinite;
}

/* 🔥 DELAYS */

.flow2{
  animation-delay:.25s;
}

.flow3{
  animation-delay:.5s;
}

.flow4{
  animation-delay:.75s;
}

/* 🔥 FLOW */

@keyframes flowMove{

  0%{

    left:-60px;

    opacity:0;

    transform:
    translateY(-50%)
    scale(.65);
  }

  10%{
    opacity:1;
  }

  50%{

    opacity:1;

    transform:
    translateY(-50%)
    scale(1);
  }

  90%{
    opacity:1;
  }

  100%{

    left:100%;

    opacity:0;

    transform:
    translateY(-50%)
    scale(.65);
  }
}

.logoutWrap{

  position:fixed;

  bottom:14px;
  left:0;

  width:100%;

  display:flex;
  justify-content:center;

  z-index:50;
}

.logoutBox{

  width:92%;

  background:#fff;

  padding:10px;

  border-radius:18px;

  box-shadow:
  0 8px 24px rgba(0,0,0,.08);
}

.logoutBtn{

  width:100%;

  border:none;

  border-radius:14px;

  padding:14px;

  background:#111;
  color:#fff;

  font-size:15px;
  font-weight:700;
}

</style>

<script>
window.supabaseClient =
window.supabase.createClient(

  "https://izoipzriynkcjtwuzrfu.supabase.co",

  "sb_publishable_7ZRL1Y4JAppLTJonepuTIw_UQyGjVVw"

);

const mobile =
localStorage.getItem(
"userMobile"
);
const userName =
localStorage.getItem(
"userName"
);

// 🔥 PROFILE UI
document.getElementById(
  "profileName"
).innerText =
userName || "User";

document.getElementById(
  "profileMobile"
).innerText =
mobile || "";

document.getElementById(
  "profileAvatar"
).innerText =

(
  userName || "U"
)
.charAt(0)
.toUpperCase();

/* 🔥 PRODUCT CACHE */

window.productMap = {};

/* 🔥 TABLES */

const tables = [

  "all_products",

  "grocery_products",

  "fresh_products",

  "offer_products",

  "home_products",

  "cool_drinks_products",

  "chocolate_products"

];

/* 🔥 LOAD PRODUCTS */

async function loadProductMap(){

  // 🔥 ALREADY LOADED
  if(
    Object.keys(window.productMap)
    .length > 0
  ){
    return;
  }

  for(const table of tables){

    const { data } =
    await supabaseClient
    .from(table)
    .select("*");

    if(!data) continue;

    data.forEach(item=>{

      window.productMap[
        table + "_" + item.id
      ] = item;

    });

  }

}

/* 🔥 BUILD ITEMS */

function buildItems(
  items,
  showAll=false
){

  let html = "";

  const finalItems =
  showAll
  ? items
  : items.slice(0,3);

  finalItems.forEach(item=>{

    const key =
    item.table_name +
    "_" +
    item.product_id;

    const product =
    window.productMap[key];

    if(!product) return;

    html += `

      <div class="itemRow">

        <img
          src="${product.image1}"
          class="itemImg"
        >

        <div style="
          flex:1;
          min-width:0;
        ">

          <div class="itemName">
            ${product.name}
          </div>

          <div class="itemQty">
            Qty: ${item.quantity}
          </div>

        </div>

        <div style="
  text-align:right;
">

  <!-- 🔥 DISCOUNT PRICE -->
  <div style="
    font-size:14px;
    font-weight:700;
    color:#111;
  ">

    ₹${
      product.discount_price ||
      product.price
    }

  </div>

  <!-- 🔥 ORIGINAL PRICE -->
  ${
    product.discount_price

    ?

    `

    <div style="
      font-size:11px;
      color:#9ca3af;
      margin-top:3px;

      text-decoration:
      line-through;
    ">

      ₹${product.original_price}

    </div>

    `

    :

    ""

  }

</div>

      </div>

    `;

  });

  return html;
}

/* 🔥 STATUS */

function getStatus(order){

  return `

    <div class="statusText">

      ${
        order.status ||
        "Order Placed"
      }

    </div>

  `;
}

/* 🔥 LOAD ORDERS */
async function loadOrders(){

  const { data , error } =
  await supabaseClient

  .from("orders")

  .select("*")

  .eq("mobile", mobile)

  .order(
    "id",
    {
      ascending:false
    }
  );

  const container =
  document.getElementById(
    "ordersList"
  );

  container.innerHTML = "";

  // 🔥 NO ORDERS
  if(!data || data.length === 0){

    container.innerHTML = `

      <div style="
        text-align:center;
        padding:80px 20px;
        color:#6b7280;
      ">

        <i class="
          fa-solid
          fa-box-open
        "
        style="
          font-size:42px;
          margin-bottom:14px;
          color:#d1d5db;
        ">
        </i>

        <div style="
          font-size:16px;
          font-weight:700;
          color:#111;
        ">
          No Orders Yet
        </div>

      </div>

    `;

    return;
  }

  data.forEach(order=>{

    const card =
    document.createElement("div");

    card.className =
    "orderCard";

    let expanded = false;

    function render(){

      card.innerHTML = `

        ${buildItems(
          order.items || [],
          expanded
        )}

        <div style="
          display:flex;
          justify-content:space-between;
          align-items:center;

          margin-top:14px;
          padding-top:14px;

          border-top:
          1px solid #f1f5f9;
        ">

          <!-- 🔥 LEFT -->
          <div>

            <div style="
              font-size:13px;
              font-weight:600;
              color:#6b7280;
            ">

              Order #${order.id}

            </div>

            <div style="
              font-size:12px;
              color:#9ca3af;
              margin-top:4px;
            ">

              ${
                order.payment_mode ||
                "Online Payment"
              }

            </div>

          </div>

          <!-- 🔥 PRICE -->
         <!-- 🔥 TOTAL -->
<div style="
  text-align:right;
">

  <div style="
    font-size:11px;
    color:#9ca3af;
    margin-bottom:4px;
    font-weight:600;
  ">

    Total

  </div>

  <div class="orderPrice">

    ₹${order.final_total || 0}

  </div>

</div>

        </div>

        ${
          order.items &&
          order.items.length > 3

          ?

          `

          <div class="seeMore">

            ${
              expanded
              ? "Show less"
              : "See all"
            }

          </div>

          `

          :

          ""
        }

      `;

      const btn =
      card.querySelector(
        ".seeMore"
      );

      if(btn){

        btn.onclick = e=>{

          e.stopPropagation();

          expanded = !expanded;

          render();

        };

      }

    }

    render();

    card.onclick = ()=>{

      openOrderPopup(order);

    };

    container.appendChild(card);

  });

}



function openOrderPopup(order){

  let html = `

    <div style="
      background:#fff;
      border-radius:18px;
      padding:18px;
    ">

      <div style="

        font-weight:700;

      ">

      <div style="

        margin-bottom:16px;
        line-height:1.5;
      ">
        ${order.address || ""}
      </div>

      ${buildItems(
        order.items || [],
        true
      )}

      <div style="
        margin-top:18px;
        padding-top:16px;
        border-top:1px solid #eee;

        display:flex;
        justify-content:space-between;

        font-size:16px;
        font-weight:700;
      ">

        <span>Total</span>

        <span style="
          color:#16a34a;
        ">
          ₹${order.final_total || 0}
        </span>

      </div>

    </div>

  `;

  document.getElementById(
    "popupContent"
  ).innerHTML = html;

  document.getElementById(
    "orderPopup"
  ).style.display =
  "block";

  document.body.style.overflow =
  "hidden";
}

/* 🔥 CLOSE POPUP */

function closePopup(){

  document.getElementById(
    "orderPopup"
  ).style.display =
  "none";

  document.body.style.overflow =
  "";
}

/* 🔥 OPEN ORDERS */
function openOrderPopup(order){

  // 🔥 STATUS
  const status =
  (
    order.status ||

  // 🔥 TRACKING STEPS
  // 🔥 TRACKING STEPS
// 🔥 TRACKING STEPS

// 🔥 CANCEL FLOW

if(status.includes("cancel")){

if(status.includes("packed")){

}

if(status.includes("out")){

}

if(status.includes("delivered")){
  currentStep = 3;
}

// 🔥 RETURN REQUESTED
if(

// 🔥 REFUND SUCCESS
if(

){

  currentStep = 5;
}
if(status.includes("cancel")){
  currentStep = 1;
}

  // 🔥 ITEMS HTML
  let itemsHTML =
  buildItems(
    order.items || [],
    true
  );

  // 🔥 TRACKING UI
  let trackingHTML = "";

if(status.includes("cancel")){

  currentStep = 1;

}


  // 🔥 NORMAL TRACKING
if(true){
    trackingHTML = `

      <div style="
        background:#fff;
        border-radius:18px;
        padding:18px;
        margin-bottom:18px;
      ">

        <div style="
          font-size:16px;
          font-weight:700;
          margin-bottom:20px;
        ">

          Order Tracking

        </div>

        ${steps.map((step,index)=>{

          const active =
          index <= currentStep;

          const isLast =
          index === steps.length - 1;

/* 🔥 BACK */
function goBack(){

  const orders =
  document.getElementById(
    "ordersSection"
  );

  // 🔥 IF ORDERS PAGE OPEN
  if(

    orders

    &&

    orders.style.display ===
    "block"

  ){

    orders.style.display =
    "none";

    document.querySelector(
      ".accountMenu"
    ).style.display =
    "flex";

    document.querySelector(
      ".headerTitle"
    ).innerText =
    "My Account";

    document.querySelector(
      ".logoutWrap"
    ).style.display =
    "flex";

    return;
  }

  // 🔥 SKIP SPLASH + LOCATION
  sessionStorage.setItem(

    "skipIntro",

    "true"

  );

  // 🔥 SMOOTH RETURN
  window.location.href =
  "index.html";
}

/* 🔥 LOGOUT */

function logout(){

  // 🔥 CLEAR USER
  localStorage.removeItem(
    "userName"
  );

  localStorage.removeItem(
    "userMobile"
  );

  // 🔥 RESET SESSION
  sessionStorage.clear();

  // 🔥 GO LOGIN
  window.location.replace(
    "login.html"
  );
}
async function openOrdersPage(){

  // 🔥 SHOW LOADER
  document.getElementById(
    "loader"
  ).style.display =
  "flex";

  // 🔥 HIDE MENU
  document.querySelector(
    ".accountMenu"
  ).style.display =
  "none";

  // 🔥 SHOW ORDERS
  document.getElementById(
    "ordersSection"
  ).style.display =
  "block";

  // 🔥 TITLE
  document.querySelector(
    ".headerTitle"
  ).innerText =
  "Your Orders";

  // 🔥 HIDE LOGOUT
  document.querySelector(
    ".logoutWrap"
  ).style.display =
  "none";

  // 🔥 LOAD PRODUCTS
  await loadProductMap();

  // 🔥 LOAD ORDERS
  await loadOrders();

  // 🔥 HIDE LOADER
  document.getElementById(
    "loader"
  ).style.display =
  "none";

}

  await supabaseClient

  .from("orders")

/* 🔥 AUTO REFRESH ORDERS */

let currentOpenedOrder = null;

/* 🔥 SAVE OPEN ORDER */
const oldOpenPopup =
openOrderPopup;

openOrderPopup = function(order){

  currentOpenedOrder = order;

  oldOpenPopup(order);

};

/* 🔥 REALTIME UPDATE */

supabaseClient

.channel("orders-live")

.on(

  "postgres_changes",

  {

    event:"UPDATE",

    schema:"public",

    table:"orders"

  },

  async(payload)=>{

    const updatedOrder =
    payload.new;

    // 🔥 REFRESH LIST
    await loadOrders();

    // 🔥 REFRESH OPEN POPUP
    if(

      currentOpenedOrder &&

      currentOpenedOrder.id ===
      updatedOrder.id

    ){

      currentOpenedOrder =
      updatedOrder;

      openOrderPopup(
        updatedOrder
      );

    }

  }

)

.subscribe();
