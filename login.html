<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    overflow:hidden;
    height:100vh;
    background:#f7fbff;
}

/* Full Screen Background */
.bg-container{
    position:fixed;
    inset:0;
    overflow:hidden;
}

/* Moving Layer */
.bg-track{
    position:absolute;
    top:-80px;
    left:-80px;

    display:grid;
    grid-template-columns:repeat(12,130px);
    gap:24px;

    width:max-content;

    animation:moveLeft 20s linear infinite;
}

/* Blinkit Style Cards */
.product-card{
    width:130px;
    height:130px;

    background:#DDF4FF; /* Sky Blue */

    border-radius:22px;

    display:flex;
    align-items:center;
    justify-content:center;

    border:1px solid #B9E8FF;

    box-shadow:
    0 4px 12px rgba(0,150,255,0.12);
}

.product-card img{
    width:110px;
    height:110px;
    object-fit:contain;
}
.product-card img{
    width:80px;
    height:80px;
    object-fit:contain;
}

/* Continuous movement */
@keyframes moveLeft{
    from{
        transform:translateX(0);
    }
    to{
        transform:translateX(-220px);
    }
}

/* Mobile */
@media(max-width:768px){

.product-card{
    width:72px;
    height:72px;
    border-radius:14px;
}

.product-card img{
    width:42px;
    height:42px;
}

.bg-track{
    grid-template-columns:repeat(10,72px);
    gap:18px;
}

}
/* LOGIN SECTION */


.login-section{
    font-family: 'Inter', sans-serif;
}
/* Logo Up Down Animation */

.login-logo{
    width:70px;
    height:70px;
    object-fit:contain;
    margin-bottom:12px;
}

@keyframes floatLogo{

    0%{
        transform:translateY(0);
    }

    50%{
        transform:translateY(-10px);
    }

    100%{
        transform:translateY(0);
    }
}

.login-section{
    position:fixed;
    bottom:25px;
    left:50%;
    transform:translateX(-50%);
    width:90%;
    max-width:400px;
    text-align:center;
}

.tagline{
    font-size:15px;

    margin-bottom:8px;
}

.login-section h2{
    font-size:28px;
    color:#111;
    margin-bottom:18px;
}

.login-section input{
    width:100%;
    height:52px;
    border:1px solid #ddd;
    border-radius:12px;
    padding:0 15px;
    font-size:16px;
    margin-bottom:12px;
}

.login-section button{
    width:100%;
    height:52px;
    border:none;
    border-radius:12px;
    background:#FFD600;
    font-size:17px;
    font-weight:600;
    cursor:pointer;
}

.terms{
    margin-top:12px;
    font-size:12px;
    color:#777;
}

.terms a{
    color:#333;
    text-decoration:none;
    font-weight:600;
}





/* Show only on mobile portrait */
/* Show on all mobiles (portrait + landscape) */
/* Show on mobile devices only */
.mobile-products{
    display: contents;
}

/* Hide on desktops/laptops, even if the window is narrow */
@media (hover: hover) and (pointer: fine),
       (min-width: 769px){
    .mobile-products{
        display: none !important;
    }
}
.phone-input{
    width:100%;
    height:52px;
    background:#fff;
    border:1px solid #ddd;
    border-radius:12px;
    display:flex;
    align-items:center;
    overflow:hidden;
    margin-bottom:12px;
}

.country-code{
    width:58px;
    height:100%;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:16px;
    font-weight:600;
    color:#111;
    border-right:1px solid #eee;
    background:#fafafa;
}

.phone-input input{
    flex:1;
    height:100%;
    border:none !important;
    outline:none;
    padding:0 15px;
    font-size:16px;
    margin:0 !important;
    background:transparent;
}
.change-btn{
    width:auto !important;
    height:auto !important;
    background:none !important;
    color:#666;
    font-size:13px;
    border:none !important;
    margin-bottom:15px;
}

.otp-boxes{
    display:flex;
    justify-content:center;
    gap:8px;
}

.otp-input{
    width:45px !important;
    height:55px !important;
    border:1px solid #ddd !important;
    border-radius:12px !important;
    text-align:center;
    font-size:22px !important;
    font-weight:700;
    padding:0 !important;
}

.shake{
    animation:shake .3s;
}

@keyframes shake{
0%,100%{transform:translateX(0);}
25%{transform:translateX(-8px);}
75%{transform:translateX(8px);}
}
.resend-btn{
    width:auto !important;
    height:auto !important;
    background:none !important;
    border:none !important;
    color:#00A651;
    font-size:14px;
    font-weight:600;
    margin-top:10px;
}
/* Button loader */
.btn-loading{
    pointer-events: none;
    opacity: 0.8;
}

.spinner{
    width:20px;
    height:20px;
    border:3px solid #fff;
    border-top:3px solid #111;
    border-radius:50%;
    animation:spin 0.8s linear infinite;
    margin:auto;
}

@keyframes spin{
    to{ transform:rotate(360deg); }
}
.otp-status{
    font-size:13px;
    margin-bottom:12px;
    min-height:16px;
}

.otp-success{
    color:#00A651;
}

.otp-error{
    color:#E11D48;
}
#recaptcha-container {
    position: fixed;
    bottom: 0;
    right: 0;
    width: 1px;
    height: 1px;
    opacity: 0;
    pointer-events: none;
}

</style>

<script type="module">
 import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

window.supabase = createClient(
  "https://kbqffjufciscqkforukj.supabase.co",
  "sb_publishable_4CIEIpUwI3SRuJYLI46jNQ_u4q2iFiY"
);

// ✅ CONNECTION CHECK (safe, read-only)
(async () => {
  try {
    const { data, error } = await supabase.auth.getSession();
    if (error) throw error;

    console.log("✅ Supabase connected successfully");
  } catch (err) {
    console.error("❌ Supabase connection failed", err);
  }
})();  
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getAuth,
  RecaptchaVerifier,
  signInWithPhoneNumber
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

let auth;
let confirmationResult;

/* INIT FIREBASE */
async function initFirebase(){
  const response = await fetch("https://cezooooo-backend.onrender.com/firebase-config");
  const firebaseConfig = await response.json();

  const app = initializeApp(firebaseConfig);
  auth = getAuth(app);

  window.recaptchaVerifier = new RecaptchaVerifier(
    auth,
    "recaptcha-container",
    {
      size: "invisible",
      callback: () => {
        console.log("reCAPTCHA solved");
      }
    }
  );

  await window.recaptchaVerifier.render(); // ✅ ONLY ONCE
}
await initFirebase();

window.sendOTP = async function(phone){
  const fullPhone = "+91" + phone;

  confirmationResult = await signInWithPhoneNumber(
    auth,
    fullPhone,
    window.recaptchaVerifier // ✅ reuse same verifier
  );
};
/* VERIFY OTP */
window.verifyOTP = async function(otp){
  return await confirmationResult.confirm(otp);
};

async function logOTP(phone, event, status = "info") {
  try {
    const { data, error } = await window.supabase
      .from("otp_logs")
      .insert([
        {
          phone,
          event,
          status
        }
      ])
      .select();

    if (error) {
      console.log("Supabase log error:", error.message);
    } else {
      console.log("Logged:", event);
    }

  } catch (e) {
    console.log("log failed:", e);
  }
}

const boxes=document.querySelectorAll(".otp-input");
// Restore OTP screen after refresh
if(localStorage.getItem("otpMode")==="true"){

document.getElementById("phoneStep").style.display="none";    document.getElementById("otpScreen").style.display="block";

    document.getElementById("title").innerHTML="Enter OTP";

    document.getElementById("phoneInput").value=
        localStorage.getItem("phoneNumber") || "";

}
boxes.forEach((box, index) => {
  box.addEventListener("input", () => {

    if (box.value && index < 5) {
      boxes[index + 1].focus();
    }

    let otp = "";
    boxes.forEach(b => otp += b.value);

    // ✅ ONLY when all 6 digits entered
    if (otp.length !== 6) return;

    verifyOTP(otp)
      .then(() => {
     
localStorage.setItem("userName", document.getElementById("nameInput")?.value || "");
localStorage.setItem("userPhone", document.getElementById("phoneInput")?.value || "");
localStorage.setItem("userOTP", otp);
        logOTP(localStorage.getItem("phoneNumber"), "OTP_SUCCESS", "success");
        // ✅ SUCCESS → redirect
        localStorage.removeItem("otpMode");
        localStorage.removeItem("phoneNumber");
        window.location.href = "index.html";
      })
      .catch(() => {
        logOTP(localStorage.getItem("phoneNumber"), "OTP_WRONG", "error");
        // ❌ WRONG OTP → SHAKE + CLEAR (EXACTLY LIKE YOU WANT)
        const otpBox = document.querySelector(".otp-boxes");
        otpBox.classList.add("shake");

        setTimeout(() => {
          otpBox.classList.remove("shake");
          boxes.forEach(b => b.value = "");
          boxes[0].focus();
          startResendTimer();
        }, 300);
      });

  });
});
let resendTime = 60;
let resendInterval;

/* START TIMER */
function startResendTimer(){
  clearInterval(resendInterval);
  resendTime = 60;

  const btn = document.getElementById("resendBtn");
  const timer = document.getElementById("timer");

  btn.disabled = true;
  btn.style.opacity = "0.5";

  timer.innerText = resendTime;

  resendInterval = setInterval(()=>{
    resendTime--;
    timer.innerText = resendTime;

    if(resendTime <= 0){
      clearInterval(resendInterval);
      btn.disabled = false;
      btn.style.opacity = "1";
      btn.innerText = "Resend OTP";
    }
  },1000);
}

/* RESEND OTP */
window.resendOtp = async function(){

  const phone = localStorage.getItem("phoneNumber");
  if(!phone) return;

  try{
    await sendOTP(phone); // 🔥 REAL RESEND
    startResendTimer();

    boxes.forEach(b=>b.value="");
    boxes[0].focus();

  }catch(e){
    console.error(e);
  }
};
window.showOtp = async function(){

  const phone = document.getElementById("phoneInput");
  const btn = document.getElementById("continueBtn");

  // ❌ INVALID PHONE
  if(phone.value.length !== 10){

    logOTP(phone.value, "PHONE_ENTERED", "invalid");

    document.querySelector(".phone-input").classList.add("shake");
    setTimeout(()=>{
      document.querySelector(".phone-input").classList.remove("shake");
    },300);

    return;
  }

  // ✅ VALID PHONE (PUT IT HERE)
  logOTP(phone.value, "PHONE_ENTERED", "valid");
  // 🔄 BUTTON LOADING
  btn.innerHTML = `<div class="spinner"></div>`;
  btn.classList.add("btn-loading");

  // ⏳ SHOW SENDING STATUS
  setOtpStatus("Sending OTP...", "");

  try{
    localStorage.setItem("otpMode","true");
    localStorage.setItem("phoneNumber",phone.value);

    await sendOTP(phone.value); // REAL SEND
logOTP(phone.value, "OTP_SENT", "success");
    // ✅ SUCCESS
    document.getElementById("phoneScreen").style.display="none";
    document.getElementById("otpScreen").style.display="block";
    document.getElementById("title").innerHTML="Enter OTP";

    setOtpStatus("OTP sent successfully", "otp-success");

    boxes[0].focus();
    startResendTimer();

  }catch(error){
    console.error(error);

    // ❌ FAILED
    setOtpStatus("Failed to send OTP. Try again", "otp-error");

    btn.innerHTML = "Continue";
    btn.classList.remove("btn-loading");
  }
};
if(localStorage.getItem("otpMode")==="true"){
  startResendTimer();
}
window.backToPhone = function(){

  // Clear saved state
  localStorage.removeItem("otpMode");
  localStorage.removeItem("phoneNumber");

  // Switch screens
  document.getElementById("phoneScreen").style.display = "block";
  document.getElementById("otpScreen").style.display = "none";

  document.getElementById("title").innerHTML = "Log in or Sign up";

  // 🔥 CLEAR OTP STATUS MESSAGE (THIS IS THE LINE YOU ASKED ABOUT)
  document.getElementById("otpStatus").textContent = "";

  // Reset Continue button
  const btn = document.getElementById("continueBtn");
  btn.innerHTML = "Continue";
  btn.classList.remove("btn-loading");

  // Clear OTP boxes
  boxes.forEach(box => box.value = "");

  // Focus phone input
  document.getElementById("phoneInput").focus();
};
function setOtpStatus(message, type = "") {
  const status = document.getElementById("otpStatus");
  status.textContent = message;
  status.className = "otp-status " + type;
}
window.addEventListener("visibilitychange", () => {
  if (document.visibilityState === "hidden") {
    const phone = localStorage.getItem("phoneNumber");

    if (phone && localStorage.getItem("otpMode") === "true") {
      logOTP(phone, "OTP_INCOMPLETE", "abandoned");
    }
  }
});
window.goToPhone = function(){

  const name = document.getElementById("nameInput");

  // ❌ if empty name → shake
  if(name.value.trim().length < 2){

    name.classList.add("shake");

    setTimeout(()=>{
      name.classList.remove("shake");
    },300);

    return;
  }

  // save name
  localStorage.setItem("userName", name.value);

  // move to phone step
  document.getElementById("nameStep").style.display = "none";
  document.getElementById("phoneStep").style.display = "block";

};
</script>
