<!doctype html>

initial-scale=1.0,

<link rel="stylesheet"

<title>Refund Policy</title>

<style>

/* BODY */
body{
  margin:0;
  padding-top:55px;
  font-family:"Segoe UI",sans-serif;
  background:#f7f8fa;
}

/* GLOBAL */
*{
  box-sizing:border-box;
}

html,body{
  overflow-x:hidden;
  width:100%;
}

/* NAVBAR */
.navbar{
  position:sticky;
  top:0;

  background:#fff;

  margin:0 10px;

  width:calc(100% - 20px);

  border-radius:12px;

  padding:12px 14px;

  display:flex;
  justify-content:space-between;
  align-items:center;

  z-index:10;
}

.nav-left{
  display:flex;
  align-items:center;
  gap:8px;
}

.title{
  font-weight:600;
  font-size:15px;
}

/* CONTENT */
.container{
  max-width:700px;
  margin:auto;
  padding:20px;
  line-height:1.7;
}
#langSelect{

  border:none;

  background:#f3f4f6;

  padding:8px 10px;

  border-radius:10px;

  font-size:13px;

  outline:none;

  max-width:90px;

  appearance:none;
  -webkit-appearance:none;

  background-image:url("data:image/svg+xml;utf8,<svg fill='black' height='20' viewBox='0 0 20 20' width='20' xmlns='http://www.w3.org/2000/svg'><path d='M5 7l5 5 5-5z'/></svg>");

  background-repeat:no-repeat;

  background-position:right 8px center;

  background-size:14px;

  padding-right:28px;

}
.navbar{
  overflow:visible;
}
h2{
  font-size:16px;
  margin-top:20px;

  border-left:3px solid #16a34a;

  padding-left:8px;
}

p{
  font-size:14px;
  color:#444;
}

ul{
  padding-left:18px;
}

.top-image{
  width:100%;
  height:160px;

  object-fit:cover;

  border-radius:12px;

  margin-bottom:15px;
}

</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">

  <div class="nav-left">

    <div onclick="goBack()">
      <i class="fa-solid fa-chevron-left"></i>
    </div>

    <div class="title" id="navTitle">
      Refund Policy
    </div>

  </div>

  <select id="langSelect"
  onchange="changeLang(this.value)">

    <option value="en">EN</option>
    <option value="te">తెలుగు</option>
    <option value="hi">हिंदी</option>

  </select>

</div>

<!-- CONTENT -->
<div class="container">

<img src="refund.svg"
class="top-image">

<p id="introText"></p>

<h2 id="eligibleTitle"></h2>
<ul id="eligibleList"></ul>

<h2 id="processTitle"></h2>
<p id="processText"></p>

<h2 id="methodTitle"></h2>
<ul id="methodList"></ul>

<h2 id="nonTitle"></h2>
<ul id="nonList"></ul>

<h2 id="cancelTitle"></h2>
<p id="cancelText"></p>

<h2 id="timeTitle"></h2>
<p id="timeText"></p>

<h2 id="abuseTitle"></h2>

<h2 id="changeTitle"></h2>

<h2 id="contactTitle"></h2>

function setList(id, arr){

  const ul =
    document.getElementById(id);

  ul.innerHTML = "";

  arr.forEach(i=>{

    let li =
      document.createElement("li");

    li.innerText = i;

    ul.appendChild(li);

  });

}

function changeLang(lang){

  const t =
    translations[lang];

  document.getElementById(
    "navTitle"
  ).innerText = t.navTitle;

  document.getElementById(
    "introText"
  ).innerText = t.intro;

  document.getElementById(
    "eligibleTitle"
  ).innerText = t.eligibleTitle;

  setList(
    "eligibleList",
    t.eligibleList
  );

  document.getElementById(
    "processTitle"
  ).innerText = t.processTitle;

  document.getElementById(
    "processText"
  ).innerText = t.processText;

  document.getElementById(
    "methodTitle"
  ).innerText = t.methodTitle;

  setList(
    "methodList",
    t.methodList
  );

  document.getElementById(
    "nonTitle"
  ).innerText = t.nonTitle;

  setList(
    "nonList",
    t.nonList
  );

  document.getElementById(
    "cancelTitle"
  ).innerText = t.cancelTitle;

  document.getElementById(
    "cancelText"
  ).innerText = t.cancelText;

  document.getElementById(
    "timeTitle"
  ).innerText = t.timeTitle;

  document.getElementById(
    "timeText"
  ).innerText = t.timeText;

  document.getElementById(
    "abuseTitle"
  ).innerText = t.abuseTitle;

  document.getElementById(
    "abuseText"
  ).innerText = t.abuseText;

  document.getElementById(
    "changeTitle"
  ).innerText = t.changeTitle;

  document.getElementById(
    "changeText"
  ).innerText = t.changeText;

  document.getElementById(
    "contactTitle"
  ).innerText = t.contactTitle;

  document.getElementById(
    "contactText"
  ).innerText = t.contactText;

  localStorage.setItem(
    "appLang",
    lang
  );

}

window.onload = ()=>{

  const lang =
    localStorage.getItem(
      "appLang"
    ) || "en";

  document.getElementById(
    "langSelect"
  ).value = lang;

  changeLang(lang);

};

function goBack(){

  sessionStorage.setItem(
    "skipIntro",
    "true"
  );

  window.location.href =
    "order.html";
}

</script>
