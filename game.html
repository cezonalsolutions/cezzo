<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Fruit Game</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html,
body{
  width:100%;
  height:100%;
  overflow:hidden;
  font-family:Arial,sans-serif;
}

body{
  background:linear-gradient(to bottom,#87e0ff,#d4ffb2);
  position:fixed;
  inset:0;
}

/* TOP IMAGE */

.top-image{
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:220px;
  object-fit:cover;
  border-bottom-left-radius:35px;
  border-bottom-right-radius:35px;
  z-index:2;
}

/* FALLING FRUITS */

.fruit{
  position:absolute;
  top:-120px;
  user-select:none;
  pointer-events:none;
  animation:fall linear infinite;
  z-index:1;
}

@keyframes fall{

  0%{
    transform:translateY(-120px) rotate(0deg);
  }

  100%{
    transform:translateY(120vh) rotate(360deg);
  }

}

/* PLAY BUTTON */

.play-btn{
  position:absolute;
  bottom:40px;
  left:50%;
  transform:translateX(-50%);
  padding:16px 40px;
  border:none;
  border-radius:16px;
  background:linear-gradient(45deg,#ff9800,#ffeb3b);
  color:white;
  font-size:24px;
  font-weight:bold;
  cursor:pointer;
  white-space:nowrap;
  box-shadow:0 8px 20px rgba(255,150,0,0.4);
  z-index:10;
}

/* HOW SCREEN */

.how-screen{
  position:fixed;
  inset:0;
  background:rgba(255,255,255,0.97);
  display:none;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  z-index:50;
  padding:20px;
  text-align:center;
}

/* HEADING */

.how-title{
  color:#ff9800;
  font-size:40px;
  font-weight:bold;
  margin-bottom:25px;
}

/* CENTER IMAGE */

.how-image{
  width:240px;
  max-width:90%;
  border-radius:25px;
  margin-bottom:25px;
}

/* POINTS */

.points{
  color:#444;
  font-size:20px;
  line-height:2;
  font-weight:bold;
  margin-bottom:35px;
}

/* TOUCH TEXT */

.tap-text{
  color:#ff9800;
  font-size:26px;
  font-weight:bold;
  animation:blink 1s infinite;
}

@keyframes blink{

  50%{
    opacity:0.3;
  }

}

/* COUNTDOWN */

.countdown{
  position:fixed;
  inset:0;
  display:none;
  justify-content:center;
  align-items:center;
  font-size:150px;
  color:white;
  font-weight:bold;
  background:rgba(0,0,0,0.2);
  z-index:100;
}

/* MOBILE */

@media(max-width:600px){

  .how-title{
    font-size:32px;
  }

  .how-image{
    width:200px;
  }

  .points{
    font-size:18px;
  }

  .tap-text{
    font-size:22px;
  }

  .countdown{
    font-size:100px;
  }

}
.points{
  width:100%;
  max-width:320px;
  display:flex;
  flex-direction:column;
  gap:14px;
  margin-bottom:35px;
}

.point-box{
  background:white;
  padding:14px 12px;

  border-radius:16px;

  font-size:16px;

  font-weight:bold;

  color:#555;

  text-align:center;

  white-space:nowrap;

  box-shadow:0 6px 16px rgba(0,0,0,0.08);

  border:2px solid rgba(255,180,0,0.25);
}
/* GAME TIMER */

.game-timer{
  position:fixed;
  top:20px;
  right:20px;
  width:70px;
  height:70px;
  border-radius:50%;
  background:white;
  display:none;
  justify-content:center;
  align-items:center;
  font-size:30px;
  font-weight:bold;
  color:#ff9800;
  box-shadow:0 6px 18px rgba(0,0,0,0.12);
  z-index:200;
}



.time-text{
  color:#ff9800;
  font-size:28px;
  font-weight:bold;
  margin-bottom:22px;
  animation:shake 0.5s infinite;
}

/* SHAKE TEXT */

@keyframes shake{

  0%{
    transform:translateX(0px);
  }

  25%{
    transform:translateX(-4px);
  }

  50%{
    transform:translateX(4px);
  }

  75%{
    transform:translateX(-4px);
  }

  100%{
    transform:translateX(0px);
  }

}
/* CENTER IMAGE */

/* CENTER IMAGE */

.center-image{
  position:fixed;
  left:50%;
  top:76%;
  transform:translate(-50%,-50%);

  width:420px;
  max-width:95vw;

  z-index:20;

  display:none;
}

/* MOBILE */

@media(max-width:600px){

  .center-image{

    width:92vw;
    max-width:none;

    top:70%;
  }

}
/* SCORE */
/* MAIN SCORE */
/* MAIN 3D SCORE */

.score-text{
  position:fixed;

  left:50%;
  top:17%;

  transform:translateX(-50%);

  font-size:72px;
  font-weight:900;

  z-index:50;

  display:none;

  color:#ffffff;

  letter-spacing:2px;

  /* 3D EFFECT */

  text-shadow:
    0 2px 0 #d9d9d9,
    0 4px 0 #bfbfbf,
    0 6px 0 #a6a6a6,
    0 8px 0 #8c8c8c,
    0 10px 18px rgba(0,0,0,0.45);

  animation:scoreBounce 0.45s infinite;
}

/* LEFT FLOAT */

.score-text::before{
  content:"+12";

  position:absolute;

  left:-90px;
  top:15px;

  font-size:28px;
  font-weight:bold;

  color:#ffe600;

  text-shadow:
    0 0 10px rgba(255,230,0,0.7);

  animation:floatLeft 1s infinite;
}

/* RIGHT FLOAT */

.score-text::after{
  content:"+25";

  position:absolute;

  right:-90px;
  top:15px;

  font-size:28px;
  font-weight:bold;

  color:#00ff99;

  text-shadow:
    0 0 10px rgba(0,255,150,0.7);

  animation:floatRight 1s infinite;
}

/* TOP FLOAT */

.score-text span{
  position:absolute;

  left:50%;
  top:-50px;

  transform:translateX(-50%);

  font-size:30px;
  font-weight:bold;

  color:#ff4dff;

  text-shadow:
    0 0 12px rgba(255,77,255,0.8);

  animation:floatTop 1s infinite;
}

/* MAIN BOUNCE */

@keyframes scoreBounce{

  0%{
    transform:translateX(-50%) scale(1);
  }

  50%{
    transform:translateX(-50%) scale(1.15);
  }

  100%{
    transform:translateX(-50%) scale(1);
  }

}

/* LEFT FLOAT */

@keyframes floatLeft{

  0%{
    opacity:0;
    transform:translateY(0px);
  }

  20%{
    opacity:1;
  }

  100%{
    opacity:0;
    transform:translateY(-35px);
  }

}

/* RIGHT FLOAT */

@keyframes floatRight{

  0%{
    opacity:0;
    transform:translateY(0px);
  }

  20%{
    opacity:1;
  }

  100%{
    opacity:0;
    transform:translateY(-35px);
  }

}

/* TOP FLOAT */

@keyframes floatTop{

  0%{
    opacity:0;
    transform:translateX(-50%) translateY(0px);
  }

  20%{
    opacity:1;
  }

  100%{
    opacity:0;
    transform:translateX(-50%) translateY(-35px);
  }

}
/* GROCERY BLAST */

.blast-item{
  position:fixed;

  left:50%;
  top:50%;

  transform:
    translate(-50%,-50%);

  pointer-events:none;

  z-index:500;

  animation:
  burstAnim 1.2s cubic-bezier(.08,.82,.17,1) forwards;
}

.blast-item img{

  width:85px;
  height:85px;

  object-fit:contain;

  animation:
    spinAnim 1.2s linear forwards;
}

/* BURST */

@keyframes burstAnim{

  0%{
    opacity:0;

    transform:
      translate(-50%,-50%)
      scale(0.1);
  }

  10%{
    opacity:1;

    transform:
      translate(-50%,-50%)
      scale(1);
  }

  100%{
    opacity:0;

    transform:
      translate(
        calc(-50% + var(--x)),
        calc(-50% + var(--y))
      )
      scale(0.2);
  }

}

/* SPIN */

@keyframes spinAnim{

  0%{
    transform:
      rotate(0deg)
      scale(0.5);
  }

  100%{
    transform:
      rotate(1400deg)
      scale(0.3);
  }

}
/* FINAL RESULT */

.final-result{
  position:fixed;

  inset:0;

  background:
    linear-gradient(
      to bottom,
      #87e0ff,
      #d4ffb2
    );

  overflow:hidden;

  z-index:9999;

  display:none;

  justify-content:center;
  align-items:center;
  flex-direction:column;

  text-align:center;

  padding:20px;

  transition:0.5s;
}
.final-result::before{

  content:"🍎 🍌 🍇 🍉 🍒 🍍 🥝 🍑 🍓 🥥 🍋 🍊";

  position:absolute;

  inset:0;

  font-size:42px;

  opacity:0.12;

  line-height:1.2;

  word-spacing:25px;

  overflow:hidden;

  animation:fallBg 1.5s linear infinite;

}
@keyframes fallBg{

  0%{
    transform:translateY(-100px);
  }

  100%{
    transform:translateY(100px);
  }

}
/* TITLE */

.final-title{

  font-size:38px;
  font-weight:900;

  color:#ff9800;

  margin-bottom:20px;
}

/* HIGHEST */

.highest-score{

  font-size:28px;
  font-weight:bold;

  color:#444;

  margin-bottom:30px;
}

/* COUPON */

.coupon-box{

  display:none;

  width:320px;
  max-width:92vw;

  background:#fff3e0;

  padding:24px;

  border-radius:24px;

  border:3px dashed #ff9800;
}

/* TEXT */

.coupon-text{

  font-size:24px;
  font-weight:bold;

  color:#ff5722;

  margin-bottom:18px;
}

/* CODE */

.coupon-code{

  font-size:34px;
  font-weight:900;

  letter-spacing:4px;

  color:#ff9800;

  margin-bottom:22px;
}

/* BUTTON */

.redeem-btn{

  width:100%;

  border:none;

  padding:16px;

  border-radius:18px;

  background:
    linear-gradient(
      45deg,
      #ff9800,
      #ff5722
    );

  color:white;

  font-size:22px;
  font-weight:bold;
}
/* FULL SCREEN WATER LAYER */

.water-layer{
  position:fixed;

  left:0;
  bottom:0;

  width:100%;
  height:100%;

  background:
    linear-gradient(
      to top,
      rgba(0,140,255,0.72),
      rgba(0,200,255,0.38)
    );

  z-index:24;

  pointer-events:none;

  display:none;

  transition:
    clip-path 0.2s linear;

  /* START FULL */
clip-path:
  polygon(
    0% 0%,
    100% 0%,
    100% 100%,
    75% 94%,
    55% 100%,
    35% 92%,
    15% 98%,
    0% 94%
  );

  backdrop-filter:
    blur(2px);
}
/* COUNTDOWN EFFECT */

.countdown{

  animation:
    zoomPop 0.9s ease;
}

@keyframes zoomPop{

  0%{
    transform:scale(0.2) rotate(-20deg);
    opacity:0;
  }

  40%{
    transform:scale(1.4) rotate(10deg);
    opacity:1;
  }

  70%{
    transform:scale(0.9) rotate(-5deg);
  }

  100%{
    transform:scale(1) rotate(0deg);
    opacity:1;
  }

}
.saved-coupon{

  position:absolute;

  left:50%;
  bottom:120px;

  transform:translateX(-50%);

  background:
    rgba(255,255,255,0.22);

  backdrop-filter:
    blur(10px);

  padding:12px 22px;

  border-radius:18px;

  border:
    1px solid rgba(255,255,255,0.4);

  box-shadow:
    0 8px 20px rgba(0,0,0,0.12);

  text-align:center;

  z-index:20;

  display:none;

  min-width:220px;
}

.saved-title{

  font-size:15px;

  font-weight:bold;

  color:#ff5722;

  margin-bottom:5px;
}
/* MIC METER */
/* MODERN MIC METER */

.mic-meter{

  position:fixed;

  top:100px;

  right:38px;

  width:34px;

  z-index:300;

  display:none;

  align-items:center;

  flex-direction:column;
}

/* MIC TEXT */

.meter-label{

  color:#ffffff;

  font-size:9px;

  font-weight:bold;

  margin-bottom:6px;

  letter-spacing:1px;

  text-shadow:
    0 0 8px rgba(255,255,255,0.8);
}

/* OUTER BAR */

.meter-container{

  position:relative;

  width:24px;

  height:135px;

  border-radius:50px;

  overflow:hidden;

  background:
    rgba(255,255,255,0.12);

  border:
    2px solid rgba(255,255,255,0.35);

  backdrop-filter:blur(8px);

  box-shadow:
    0 0 15px rgba(255,255,255,0.18),
    inset 0 0 10px rgba(255,255,255,0.12);
}

/* INNER LEVEL */

.meter-fill{

  position:absolute;

  left:0;

  bottom:0;

  width:100%;

  height:0%;

  border-radius:50px;

  background:
    linear-gradient(
      to top,
      #00ff88 0%,
      #ffee00 55%,
      #ff2d55 100%
    );

  box-shadow:
    0 0 18px rgba(255,255,255,0.4);

  transition:
    height 0.07s linear;
}

/* GLOW EFFECT */

.meter-fill::after{

  content:\"\";

  position:absolute;

  top:0;
  left:0;

  width:100%;
  height:18px;

  background:
    rgba(255,255,255,0.5);

  filter:blur(4px);
}




.saved-code{

  font-size:24px;

  font-weight:900;

  color:#ff9800;

  letter-spacing:2px;
}
/* MAIN */

.semi-wrap{

  position:relative;

  width:100vw;

  height:420px;

  margin-bottom:-140px;

  overflow:hidden;

  animation:
    pageEnter 1s cubic-bezier(.17,.84,.44,1);
}

/* TRACK */

.track{

  position:absolute;

  width:1100px;
  height:1100px;

  left:50%;

  bottom:-760px;

  transform:
    translateX(-50%);

  animation:
    arcMove 8s linear infinite;
}

/* IMAGE */

.item{

  position:absolute;

  left:50%;
  top:50%;

  width:130px;
  height:190px;

  margin:-65px;

  overflow:hidden;

  transform:
    rotate(var(--r))
    translateY(-470px);

  animation:
    floatItem 3s ease-in-out infinite;
}

/* IMAGE */

.item img{

  width:100%;
  height:100%;

  object-fit:contain;

  display:block;
}

/* ARC */

@keyframes arcMove{

  0%{

    transform:
      translateX(-50%)
      rotate(-90deg);
  }

  50%{

    transform:
      translateX(-50%)
      rotate(0deg);
  }

  100%{

    transform:
      translateX(-50%)
      rotate(90deg);
  }

}

/* FLOAT */

@keyframes floatItem{

  0%{
    margin-top:0;
  }

  50%{
    margin-top:-12px;
  }

  100%{
    margin-top:0;
  }

}

/* PAGE OPEN */

@keyframes pageEnter{

  0%{

    opacity:0;

    transform:
      scale(0.75)
      translateY(120px);
  }

  60%{

    opacity:1;

    transform:
      scale(1.05)
      translateY(-10px);
  }

  100%{

    opacity:1;

    transform:
      scale(1)
      translateY(0);
  }

}

/* MOBILE */

@media(max-width:600px){

  .semi-wrap{

    height:320px;

    margin-bottom:-120px;
  }

  .track{

    width:760px;
    height:760px;

    bottom:-520px;
  }

  .item{

    width:150px;
    height:150px;

    margin:-75px;

    transform:
      rotate(var(--r))
      translateY(-330px);
  }

}
</style>
</head>

<script>

/* FALLING FRUITS */


/* OPEN HOW SCREEN */

function openHow(){

  document.querySelector(".play-btn")
  .style.display = "none";

  document.getElementById("howScreen")
  .style.display = "flex";

}

/* TOUCH TO START */

document.getElementById("howScreen")
.addEventListener("click",startCountdown);

function startCountdown(){

  document.getElementById("howScreen")
  .style.display = "none";

  const countdown =
    document.getElementById("countdown");

  countdown.style.display = "flex";

  let number = 3;

  countdown.innerHTML = number;
countdown.style.animation =
  "none";

countdown.offsetHeight;

countdown.style.animation =
  "zoomPop 0.9s ease";
const timer = setInterval(()=>{

  number--;

  if(number > 0){

    countdown.innerHTML = number;

    countdown.style.animation =
      "none";

    countdown.offsetWidth;

    countdown.style.animation =
      "zoomPop 0.9s ease";

  }else{

    clearInterval(timer);

    setTimeout(()=>{

      countdown.style.display = "none";

      startGameTimer();

    },800);

  }

},1000);
}
/* GROCERY BLAST */

const blastImages = [

  "cat/ice.png",
  "cat/ice.png",
  "cat/ice.png",
  "cat/ice.png",
  "cat/ice.png"

];

function createBlast(){

  const total = 120;

  for(let i=0;i<total;i++){

    const item =
      document.createElement("div");

    item.className = "blast-item";

    const img =
      document.createElement("img");

    img.src =
      blastImages[
        Math.floor(
          Math.random()*blastImages.length
        )
      ];

    const size =
      Math.random()*65 + 45;

    img.style.width =
      size + "px";

    img.style.height =
      size + "px";

    item.appendChild(img);

    const angle =
      (Math.PI * 2 / total) * i;

    const distance =
      Math.random() * 1000 + 250;

    const x =
      Math.cos(angle) * distance;

    const y =
      Math.sin(angle) * distance;

    item.style.setProperty(
      "--x",
      x + "px"
    );

    item.style.setProperty(
      "--y",
      y + "px"
    );

    document.body.appendChild(item);

    setTimeout(()=>{

      item.remove();

    },1200);

  }

}
/* RANDOM COUPON */

function generateCoupon(){

  const chars =
    "ABCDEFGH123456789";

  let code = "";

  for(let i=0;i<8;i++){
