<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Fruit Game</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html,
body{
  width:100%;
  height:100%;
  overflow:hidden;
  font-family:Arial,sans-serif;
}

body{
  background:linear-gradient(to bottom,#87e0ff,#d4ffb2);
  position:fixed;
  inset:0;
}

/* TOP IMAGE */

.top-image{
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:220px;
  object-fit:cover;
  border-bottom-left-radius:35px;
  border-bottom-right-radius:35px;
  z-index:2;
}

/* FALLING FRUITS */

.fruit{
  position:absolute;
  top:-120px;
  user-select:none;
  pointer-events:none;
  animation:fall linear infinite;
  z-index:1;
}

@keyframes fall{

  0%{
    transform:translateY(-120px) rotate(0deg);
  }

  100%{
    transform:translateY(120vh) rotate(360deg);
  }

}

/* PLAY BUTTON */

.play-btn{
  position:absolute;
  bottom:40px;
  left:50%;
  transform:translateX(-50%);
  padding:16px 40px;
  border:none;
  border-radius:16px;
  background:linear-gradient(45deg,#ff9800,#ffeb3b);
  color:white;
  font-size:24px;
  font-weight:bold;
  cursor:pointer;
  white-space:nowrap;
  box-shadow:0 8px 20px rgba(255,150,0,0.4);
  z-index:10;
}

/* HOW SCREEN */

.how-screen{
  position:fixed;
  inset:0;
  background:rgba(255,255,255,0.97);
  display:none;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  z-index:50;
  padding:20px;
  text-align:center;
}

/* HEADING */

.how-title{
  color:#ff9800;
  font-size:40px;
  font-weight:bold;
  margin-bottom:25px;
}

/* CENTER IMAGE */

.how-image{
  width:240px;
  max-width:90%;
  border-radius:25px;
  margin-bottom:25px;
}

/* POINTS */

.points{
  color:#444;
  font-size:20px;
  line-height:2;
  font-weight:bold;
  margin-bottom:35px;
}

/* TOUCH TEXT */

.tap-text{
  color:#ff9800;
  font-size:26px;
  font-weight:bold;
  animation:blink 1s infinite;
}

@keyframes blink{

  50%{
    opacity:0.3;
  }

}

/* COUNTDOWN */

.countdown{
  position:fixed;
  inset:0;
  display:none;
  justify-content:center;
  align-items:center;
  font-size:150px;
  color:white;
  font-weight:bold;
  background:rgba(0,0,0,0.2);
  z-index:100;
}

/* MOBILE */

@media(max-width:600px){

  .how-title{
    font-size:32px;
  }

  .how-image{
    width:200px;
  }

  .points{
    font-size:18px;
  }

  .tap-text{
    font-size:22px;
  }

  .countdown{
    font-size:100px;
  }

}
.points{
  width:100%;
  max-width:320px;
  display:flex;
  flex-direction:column;
  gap:14px;
  margin-bottom:35px;
}

.point-box{
  background:white;
  padding:14px 18px;
  border-radius:16px;
  font-size:18px;
  font-weight:bold;
  color:#555;
  box-shadow:0 6px 16px rgba(0,0,0,0.08);
  border:2px solid rgba(255,180,0,0.25);
}
/* GAME TIMER */

.game-timer{
  position:fixed;
  top:20px;
  right:20px;
  width:70px;
  height:70px;
  border-radius:50%;
  background:white;
  display:none;
  justify-content:center;
  align-items:center;
  font-size:30px;
  font-weight:bold;
  color:#ff9800;
  box-shadow:0 6px 18px rgba(0,0,0,0.12);
  z-index:200;
}



.time-text{
  color:#ff9800;
  font-size:28px;
  font-weight:bold;
  margin-bottom:22px;
  animation:shake 0.5s infinite;
}

/* SHAKE TEXT */

@keyframes shake{

  0%{
    transform:translateX(0px);
  }

  25%{
    transform:translateX(-4px);
  }

  50%{
    transform:translateX(4px);
  }

  75%{
    transform:translateX(-4px);
  }

  100%{
    transform:translateX(0px);
  }

}
/* CENTER IMAGE */

/* CENTER IMAGE */

.center-image{
  position:fixed;
  left:50%;
  top:76%;
  transform:translate(-50%,-50%);

  width:420px;
  max-width:95vw;

  z-index:20;

  display:none;
}

/* MOBILE */

@media(max-width:600px){

  .center-image{

    width:92vw;
    max-width:none;

    top:70%;
  }

}
/* SCORE */
/* MAIN SCORE */
/* MAIN 3D SCORE */

.score-text{
  position:fixed;

  left:50%;
  top:17%;

  transform:translateX(-50%);

  font-size:72px;
  font-weight:900;

  z-index:50;

  display:none;

  color:#ffffff;

  letter-spacing:2px;

  /* 3D EFFECT */

  text-shadow:
    0 2px 0 #d9d9d9,
    0 4px 0 #bfbfbf,
    0 6px 0 #a6a6a6,
    0 8px 0 #8c8c8c,
    0 10px 18px rgba(0,0,0,0.45);

  animation:scoreBounce 0.45s infinite;
}

/* LEFT FLOAT */

.score-text::before{
  content:"+12";

  position:absolute;

  left:-90px;
  top:15px;

  font-size:28px;
  font-weight:bold;

  color:#ffe600;

  text-shadow:
    0 0 10px rgba(255,230,0,0.7);

  animation:floatLeft 1s infinite;
}

/* RIGHT FLOAT */

.score-text::after{
  content:"+25";

  position:absolute;

  right:-90px;
  top:15px;

  font-size:28px;
  font-weight:bold;

  color:#00ff99;

  text-shadow:
    0 0 10px rgba(0,255,150,0.7);

  animation:floatRight 1s infinite;
}

/* TOP FLOAT */

.score-text span{
  position:absolute;

  left:50%;
  top:-50px;

  transform:translateX(-50%);

  font-size:30px;
  font-weight:bold;

  color:#ff4dff;

  text-shadow:
    0 0 12px rgba(255,77,255,0.8);

  animation:floatTop 1s infinite;
}

/* MAIN BOUNCE */

@keyframes scoreBounce{

  0%{
    transform:translateX(-50%) scale(1);
  }

  50%{
    transform:translateX(-50%) scale(1.15);
  }

  100%{
    transform:translateX(-50%) scale(1);
  }

}

/* LEFT FLOAT */

@keyframes floatLeft{

  0%{
    opacity:0;
    transform:translateY(0px);
  }

  20%{
    opacity:1;
  }

  100%{
    opacity:0;
    transform:translateY(-35px);
  }

}

/* RIGHT FLOAT */

@keyframes floatRight{

  0%{
    opacity:0;
    transform:translateY(0px);
  }

  20%{
    opacity:1;
  }

  100%{
    opacity:0;
    transform:translateY(-35px);
  }

}

/* TOP FLOAT */

@keyframes floatTop{

  0%{
    opacity:0;
    transform:translateX(-50%) translateY(0px);
  }

  20%{
    opacity:1;
  }

  100%{
    opacity:0;
    transform:translateX(-50%) translateY(-35px);
  }

}
</style>
</head>

<body>

<!-- TOP IMAGE -->

<img 
  src="baners/l1.png"
  class="top-image"
>

<!-- PLAY BUTTON -->

<button class="play-btn" onclick="openHow()">
  Play Now
</button>

<!-- HOW TO PLAY SCREEN -->

<div class="how-screen" id="howScreen">

  <div class="how-title">
    How To Play
  </div>

  <img 
    src="shouting.jpg"
    class="how-image"
  >
<div class="time-text">
  ⏰ You Have Only 15 Seconds
</div>
 <div class="points">

  <div class="point-box">
    Shoot As You Can
  </div>

  <div class="point-box">
    Avoid Missing Fruits
  </div>

  <div class="point-box">
    Claim The Offer
  </div>

  <div class="point-box">
    Score More Points
  </div>

</div>

  <div class="tap-text">
    Touch Anywhere To Start
  </div>

</div>

<!-- COUNTDOWN -->

<div class="countdown" id="countdown">
  3
</div>
<div class="game-timer" id="gameTimer">
  15
</div>
<!-- CENTER IMAGE -->

<img
  src="cat/ice.png"
  class="center-image"
  id="centerImage"
>
<div class="score-text" id="scoreText">
  1%
  <span>+50</span>
</div>
<script>

/* FALLING FRUITS */

const fruits = [
'🍎','🍌','🍇','🍉',
'🍒','🍍','🥝','🍑',
'🍓','🥥','🍋','🍊'
];

for(let i=0;i<120;i++){

  const fruit =
    document.createElement("div");

  fruit.classList.add("fruit");

  fruit.innerHTML =
    fruits[Math.floor(Math.random()*fruits.length)];

  fruit.style.left =
    Math.random()*95 + "vw";

  fruit.style.fontSize =
    (Math.random()*35 + 25) + "px";

  fruit.style.animationDuration =
    (Math.random()*5 + 3) + "s";

  fruit.style.animationDelay =
    (Math.random()*5) + "s";

  document.body.appendChild(fruit);

}

/* OPEN HOW SCREEN */

function openHow(){

  document.querySelector(".play-btn")
  .style.display = "none";

  document.getElementById("howScreen")
  .style.display = "flex";

}

/* TOUCH TO START */

document.getElementById("howScreen")
.addEventListener("click",startCountdown);

function startCountdown(){

  document.getElementById("howScreen")
  .style.display = "none";

  const countdown =
    document.getElementById("countdown");

  countdown.style.display = "flex";

  let number = 3;

  countdown.innerHTML = number;

  const timer = setInterval(()=>{

    number--;

    if(number > 0){

      countdown.innerHTML = number;

    }else{

      clearInterval(timer);

      countdown.innerHTML = "1";

      setTimeout(()=>{

        countdown.style.display = "none";

        startGameTimer();

      },1000);

    }

  },1000);

}

/* 15 SECOND TIMER */
/* 15 SECOND TIMER */
/* 15 SECOND TIMER */

function startGameTimer(){

  /* HIDE FRUITS */

  document.querySelectorAll(".fruit")
  .forEach(fruit=>{

    fruit.style.display = "none";

  });

  /* SHOW IMAGE */

  document.getElementById("centerImage")
  .style.display = "block";

  /* SHOW SCORE */

  const scoreText =
    document.getElementById("scoreText");

  scoreText.style.display = "block";

  let score = 1;

  scoreText.innerHTML = score;

  /* MIC */

  navigator.mediaDevices.getUserMedia({
    audio:true
  }).then(stream=>{

    const audioContext =
      new AudioContext();

    const mic =
      audioContext.createMediaStreamSource(stream);

    const analyser =
      audioContext.createAnalyser();

    analyser.fftSize = 2048;

    mic.connect(analyser);

    const data =
      new Uint8Array(analyser.frequencyBinCount);

    function detectVoice(){

      analyser.getByteFrequencyData(data);

      let volume = 0;

      for(let i=0;i<data.length;i++){

        volume += data[i];

      }

      volume = volume / data.length;

      /* ONLY REAL SHOUT */

      if(volume > 80){

        /* VERY LOUD SHOUT */

        score += 2.8;

      }

      else if(volume > 68){

        /* LOUD SHOUT */

        score += 1.2;

      }

      else{

        /* TALKING / NOISE */

       score -= 1.8;

      }

      /* LIMIT */

      if(score < 1){

        score = 1;

      }

      if(score > 100){

        score = 100;

      }

      /* UPDATE */

      scoreText.innerHTML =
        Math.floor(score);

      requestAnimationFrame(detectVoice);

    }

    detectVoice();

  })

  .catch(err=>{

    alert("Allow Microphone Permission");

  });

  /* TIMER */

  const gameTimer =
    document.getElementById("gameTimer");

  gameTimer.style.display = "flex";

  let timeLeft = 15;

  gameTimer.innerHTML = timeLeft;

  const gameInterval = setInterval(()=>{

    timeLeft--;

    gameTimer.innerHTML = timeLeft;

    if(timeLeft <= 0){

      clearInterval(gameInterval);

      gameTimer.innerHTML = "0";

      /* HIDE GAME */

      document.getElementById("centerImage")
      .style.display = "none";

      document.getElementById("scoreText")
      .style.display = "none";

      gameTimer.style.display = "none";

      /* SHOW FRUITS AGAIN */

      document.querySelectorAll(".fruit")
      .forEach(fruit=>{

        fruit.style.display = "block";

      });

      /* SHOW PLAY BUTTON */

      document.querySelector(".play-btn")
      .style.display = "block";

    }

  },1000);

}
</script>

</body>
</html>
