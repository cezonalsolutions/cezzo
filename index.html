<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Products Table</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.29/jspdf.plugin.autotable.min.js"></script>

<style>
body{
  font-family: Arial, sans-serif;
  background:#f4f6f8;
  padding:20px;
}

h1{ text-align:center; }

.table-wrapper{
  overflow-x:auto;
  background:#fff;
}

button{
  padding:6px 10px;
  font-size:13px;
  border:none;
  border-radius:5px;
  cursor:pointer;
}

.download-btn{ background:#1976d2; color:#fff; margin-bottom:15px; }
.delete-btn{ background:#e53935; color:#fff; }
.save-btn{ background:#2e7d32; color:#fff; }

table{
  width:100%;
  border-collapse:collapse;
  min-width:2200px;
}

th, td{
  padding:8px;
  border:1px solid #ddd;
  text-align:center;
  vertical-align:top;
  font-size:12px;
}

th{ background:#eeeeee; position:sticky; top:0; }

img{
  width:60px;
  height:60px;
  object-fit:cover;
  display:block;
  margin:3px auto;
}

input[type="file"]{
  font-size:11px;
}
.ing-item{
  font-size:10px;
  line-height:1.1;
  padding:1px 0;
  margin:0;
}
</style>
</head>

<body>

<h1>All Products</h1>
<h3 id="productCount">Total Products: 0</h3>

<button class="download-btn" id="downloadPdf">Download PDF</button>

<div class="table-wrapper">
<table>
<thead>
<tr>
  <th>ID</th>
  <th>Name</th>
  <th>Brand</th>
  <th>Price</th>
  <th>Qty</th>

  <th>Images</th>
  <th>Upload</th>
  <th>Action</th>

  <!-- ✅ EXTRA DETAILS MOVED TO LAST -->
  <th>Short</th>
  <th>Long</th>
  <th>Ingredients</th>
  <th>How To Use</th>
  <th>Benefits</th>
  <th>Extra Info</th>

  <th>Rating</th>
  <th>Seller</th>
  <th>FSSAI</th>
  <th>Address</th>
  <th>Care</th>
</tr>
</thead>

<tbody id="productBody"></tbody>
</table>
</div>

<script>
const SUPABASE_URL = "https://izoipzriynkcjtwuzrfu.supabase.co";
const SUPABASE_KEY = "sb_publishable_7ZRL1Y4JAppLTJonepuTIw_UQyGjVVw";
const BUCKET = "product-images";

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const tbody = document.getElementById("productBody");
let allProducts = [];
function formatObjectTable(obj){
  if(!obj) return "-";
  if(typeof obj === "string") return obj;

  return Object.entries(obj)
    .map(([k, v]) => `<div class="ing-item"><b>${k}</b>: ${v}</div>`)
    .join("");
}
async function loadData(){
  const { data, error } = await sb
    .from("new_products")
    .select("*")
    .order("id", { ascending: true });

  if(error){
    console.log(error);
    alert("Load failed");
    return;
  }

  allProducts = data;
  document.getElementById("productCount").textContent =
  `Total Products: ${data.length}`;
  tbody.innerHTML = "";
  data.forEach(addRow);
}

loadData();
function addRow(p){

  const tr = document.createElement("tr");

  tr.innerHTML = `
  <td>${p.id}</td>
  <td>${p.name}</td>
  <td>${p.brand || "-"}</td>
  <td>₹${p.original_price} / ₹${p.discount_price}</td>
  <td>${p.quantity} ${p.unit}</td>

  <td>
    <img src="${p.image1 || ''}">
    <img src="${p.image2 || ''}">
    <img src="${p.image3 || ''}">
  </td>

  <td>
   <input type="file" class="img1" accept="image/webp"><br>
<input type="file" class="img2" accept="image/webp"><br>
<input type="file" class="img3" accept="image/webp"><br>
    <button class="save-btn">Save</button>
  </td>

  <td>
    <button class="delete-btn">Delete</button>
  </td>

  <td>${p.short_desc || "-"}</td>
  <td>${p.long_desc || "-"}</td>

  <td>
    ${formatObjectTable(p.ingredients)}
    <br>
    <button class="ing-replace-btn"
      style="margin-top:5px;padding:4px 6px;font-size:11px;background:#ff9800;color:#fff;border:none;border-radius:4px;">
      Replace
    </button>
  </td>

 <td>
  <div class="htu-text">
    ${(p.how_to_use || "-")
      .split("\n")
      .map(line => line.trim())
      .filter(line => line)
      .map(line => `• ${line}`)
      .join("<br>")}
  </div>

  <button class="htu-replace-btn"
    style="margin-top:5px;padding:4px 6px;font-size:11px;background:#2196f3;color:#fff;border:none;border-radius:4px;">
    Replace
  </button>
</td>
  <td>
  <div class="benefits-text">
    ${(p.benefits || "-")
      .split("\n")
      .map(line => line.trim())
      .filter(line => line)
      .map(line => `• ${line}`)
      .join("<br>")}
  </div>

  <button class="benefits-replace-btn"
    style="margin-top:5px;padding:4px 6px;font-size:11px;background:#4caf50;color:#fff;border:none;border-radius:4px;">
    Replace
  </button>
</td>
  <td>${p.additional_info || "-"}</td>
  `;

  // ✅ SAVE IMAGES
  tr.querySelector(".save-btn").onclick = async function(){
    const f1 = tr.querySelector(".img1").files[0];
    const f2 = tr.querySelector(".img2").files[0];
    const f3 = tr.querySelector(".img3").files[0];

    const updates = {};

    if(f1) updates.image1 = await uploadImage(p.id, f1, 1);
    if(f2) updates.image2 = await uploadImage(p.id, f2, 2);
    if(f3) updates.image3 = await uploadImage(p.id, f3, 3);

    await sb.from("new_products").update(updates).eq("id", p.id);

    loadData();
  };

  // ✅ INGREDIENT REPLACE BUTTON (IMPORTANT FIX)
  tr.querySelector(".ing-replace-btn").onclick = function () {

    let current = p.ingredients || {};

    if (typeof current === "string") {
      try {
        current = JSON.parse(current);
      } catch {
        current = {};
      }
    }

    let text = Object.entries(current)
      .map(([k, v]) => `${k}:${v}`)
      .join("\n");

    const input = prompt("Edit Ingredients (Key:Value per line)", text);

    if (!input) return;

    const obj = {};

    input.split("\n").forEach(line => {
      const [key, value] = line.split(":");
      if (key && value) {
        obj[key.trim()] = value.trim();
      }
    });

    updateIngredients(p.id, obj);
  };
  // INGREDIENT REPLACE
  tr.querySelector(".ing-replace-btn").onclick = function () {

    let current = p.ingredients || {};

    if (typeof current === "string") {
      try { current = JSON.parse(current); }
      catch { current = {}; }
    }

    let text = Object.entries(current)
      .map(([k, v]) => `${k}:${v}`)
      .join("\n");

    const input = prompt("Edit Ingredients (Key:Value per line)", text);

    if (!input) return;

    const obj = {};

    input.split("\n").forEach(line => {
      const [key, value] = line.split(":");
      if (key && value) {
        obj[key.trim()] = value.trim();
      }
    });

    updateIngredients(p.id, obj);
  };

  // HOW TO USE REPLACE
  tr.querySelector(".htu-replace-btn").onclick = function () {

    let current = p.how_to_use || "";

    const input = prompt(
      "Enter How To Use (one line per point, NO dots, NO numbers)",
      current
    );

    if (!input) return;

    const cleaned = input
      .split("\n")
      .map(line =>
        line
          .replace(/^\d+[\).\s-]*/g, "")
          .replace(/^[•\-*]\s*/g, "")
          .trim()
      )
      .filter(line => line.length > 0)
      .join("\n");

    updateHowToUse(p.id, cleaned);
  };
tr.querySelector(".benefits-replace-btn").onclick = function () {

  let current = p.benefits || "";

  const input = prompt(
    "Enter Benefits (one line per point, NO numbers or dots)",
    current
  );

  if (!input) return;

  const cleaned = input
    .split("\n")
    .map(line =>
      line
        .replace(/^\d+[\).\s-]*/g, "")
        .replace(/^[•\-*]\s*/g, "")
        .trim()
    )
    .filter(line => line.length > 0)
    .join("\n");

  updateBenefits(p.id, cleaned);
};
// ✅ DELETE PRODUCT (NO CONFIRM, NO ALERT)
tr.querySelector(".delete-btn").onclick = async function () {

  // 1️⃣ Delete row from table
  const { error } = await sb
    .from("new_products")
    .delete()
    .eq("id", p.id);

  if (error) {
    console.error("Delete failed:", error);
    return;
  }

  // 2️⃣ Delete images from storage (silent)
  await sb.storage.from(BUCKET).remove([
    `product_${p.id}_img1.webp`,
    `product_${p.id}_img2.webp`,
    `product_${p.id}_img3.webp`
  ]);

  // 3️⃣ Refresh table
  loadData();
};
  // 👇 ONLY NOW append row
  tbody.appendChild(tr);
}

   async function updateBenefits(id, data) {

  const { error } = await sb
    .from("new_products")
    .update({
      benefits: data
    })
    .eq("id", id);

  if (error) {
    console.log(error);
    alert("Update failed");
    return;
  }

  alert("Benefits updated!");
  loadData();
}
async function updateIngredients(id, data) {

  const { error } = await sb
    .from("new_products")
    .update({
      ingredients: data
    })
    .eq("id", id);

  if (error) {
    console.log(error);
    alert("Update failed");
    return;
  }

  alert("Ingredients updated!");
  loadData();
}
async function uploadImage(productId, file, index){

  const filePath = `product_${productId}_img${index}.webp`;

  const { error } = await sb.storage
    .from(BUCKET)
    .upload(filePath, file, {
      upsert: true,
      contentType: "image/webp"
    });

  if(error){
    console.log(error);
    alert("Image upload failed");
    return "";
  }

  const { data } = sb.storage
    .from(BUCKET)
    .getPublicUrl(filePath);

  return data.publicUrl;
}
// ✅ DELETE PRODUCT

async function updateHowToUse(id, data) {

  const { error } = await sb
    .from("new_products")
    .update({
      how_to_use: data
    })
    .eq("id", id);

  if (error) {
    console.log(error);
    alert("Update failed");
    return;
  }

  alert("How To Use updated!");
  loadData();
}
</script>

</body>
</html>
