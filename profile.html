<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,initial-scale=1.0">

<title>My Profile</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{

  background:#f6f7fb;
  font-family:Segoe UI,sans-serif;

  overflow-x:hidden;
}

/* 🔥 HEADER */

.header{

  position:sticky;
  top:0;
  z-index:100;

  background:#fff;

  display:flex;
  align-items:center;
  gap:12px;

  padding:
  calc(46px + env(safe-area-inset-top))
  16px
  16px;

  box-shadow:
  0 4px 14px rgba(0,0,0,.05);
}

.backBtn{

  width:38px;
  height:38px;

  border-radius:50%;

  background:#f3f4f6;

  display:flex;
  align-items:center;
  justify-content:center;

  font-size:15px;
}

.headerTitle{

  font-size:19px;
  font-weight:700;
}

/* 🔥 CONTAINER */

.container{

  padding:16px;
  padding-bottom:40px;
}

/* 🔥 PROFILE CARD */

.profileCard{

  background:#fff;

  border-radius:24px;

  padding:22px;

  box-shadow:
  0 4px 14px rgba(0,0,0,.05);
}

/* 🔥 USER TOP */

.userTop{

  display:flex;
  align-items:center;
  gap:16px;

  margin-bottom:22px;
}

.avatar{

  width:72px;
  height:72px;

  border-radius:50%;

  background:
  linear-gradient(
    135deg,
    #16a34a,
    #22c55e
  );

  display:flex;
  align-items:center;
  justify-content:center;

  color:#fff;

  font-size:28px;
  font-weight:700;

  flex-shrink:0;
}

.userName{

  font-size:21px;
  font-weight:800;
  color:#111;
}

.userMobile{

  margin-top:6px;

  font-size:14px;
  color:#6b7280;
}

/* 🔥 SECTION */

.section{

  margin-top:24px;
}

.sectionTitle{

  font-size:15px;
  font-weight:700;

  margin-bottom:14px;

  color:#111;
}

/* 🔥 ADDRESS CARD */

.addressCard{

  background:#f9fafb;

  border-radius:18px;

  padding:16px;

  margin-bottom:12px;

  border:
  1px solid #f1f5f9;
}

.addressTop{

  display:flex;
  align-items:center;
  gap:10px;

  margin-bottom:10px;
}

.locIcon{

  width:38px;
  height:38px;

  border-radius:12px;

  background:#ecfdf5;

  display:flex;
  align-items:center;
  justify-content:center;

  color:#16a34a;
}

.addressLabel{

  font-size:14px;
  font-weight:700;
}

.addressText{

  font-size:14px;
  color:#374151;

  line-height:1.6;

  word-break:break-word;
}

/* 🔥 EMPTY */

.empty{

  text-align:center;

  padding:60px 20px;

  color:#9ca3af;
}

/* 🔥 LOADER */

.loaderWrap{

  position:fixed;
  inset:0;

  background:
  rgba(255,255,255,.45);

  backdrop-filter:
  blur(10px);

  display:flex;
  align-items:center;
  justify-content:center;

  z-index:99999;
}

/* 🔥 FLOW */

.flowLoader{

  position:relative;

  width:100vw;

  height:90px;

  overflow:hidden;
}

.flowIcon{

  position:absolute;

  top:50%;
  left:-60px;

  transform:
  translateY(-50%);

  font-size:34px;

  color:#2874f0;

  opacity:0;

  animation:
  flowMove 1.1s linear infinite;
}

.flow2{
  animation-delay:.25s;
}

.flow3{
  animation-delay:.5s;
}

.flow4{
  animation-delay:.75s;
}

@keyframes flowMove{

  0%{

    left:-60px;

    opacity:0;

    transform:
    translateY(-50%)
    scale(.65);
  }

  10%{
    opacity:1;
  }

  50%{

    opacity:1;

    transform:
    translateY(-50%)
    scale(1);
  }

  90%{
    opacity:1;
  }

  100%{

    left:100%;

    opacity:0;

    transform:
    translateY(-50%)
    scale(.65);
  }
}

</style>
</head>

<body>

<!-- 🔥 HEADER -->

<div class="header">

  <div
    class="backBtn"
    onclick="goBack()"
  >
    <i class="fa-solid fa-arrow-left"></i>
  </div>

  <div class="headerTitle">
    My Profile
  </div>

</div>

<!-- 🔥 LOADER -->

<div
  class="loaderWrap"
  id="loader"
>

  <div class="flowLoader">

    <i class="
      fa fa-shopping-bag
      flowIcon
      flow1
    "></i>

    <i class="
      fa fa-bolt
      flowIcon
      flow2
    "></i>

    <i class="
      fa fa-truck
      flowIcon
      flow3
    "></i>

    <i class="
      fa fa-gift
      flowIcon
      flow4
    "></i>

  </div>

</div>

<!-- 🔥 MAIN -->

<div class="container">

  <div class="profileCard">

    <!-- 🔥 USER -->

    <div class="userTop">

      <div
        class="avatar"
        id="avatar"
      >
        U
      </div>

      <div>

        <div
          class="userName"
          id="userName"
        >
          User
        </div>

        <div
          class="userMobile"
          id="userMobile"
        >
          +91
        </div>

      </div>

    </div>

    <!-- 🔥 STATS -->

<div style="
  display:grid;
  grid-template-columns:
  repeat(3,1fr);

  gap:12px;

  margin-top:22px;
">

  <!-- TOTAL -->
  <div style="
    background:#f9fafb;
    border-radius:18px;
    padding:16px 10px;
    text-align:center;
  ">

    <div
      id="totalOrders"
      style="
        font-size:22px;
        font-weight:800;
        color:#111;
      "
    >
      0
    </div>

    <div style="
      font-size:12px;
      color:#6b7280;
      margin-top:4px;
    ">
      Total Orders
    </div>

  </div>

  <!-- DELIVERED -->
  <div style="
    background:#ecfdf5;
    border-radius:18px;
    padding:16px 10px;
    text-align:center;
  ">

    <div
      id="deliveredOrders"
      style="
        font-size:22px;
        font-weight:800;
        color:#16a34a;
      "
    >
      0
    </div>

    <div style="
      font-size:12px;
      color:#16a34a;
      margin-top:4px;
    ">
      Delivered
    </div>

  </div>

  <!-- CANCELLED -->
  <div style="
    background:#fef2f2;
    border-radius:18px;
    padding:16px 10px;
    text-align:center;
  ">

    <div
      id="cancelledOrders"
      style="
        font-size:22px;
        font-weight:800;
        color:#ef4444;
      "
    >
      0
    </div>

    <div style="
      font-size:12px;
      color:#ef4444;
      margin-top:4px;
    ">
      Cancelled
    </div>

  </div>

</div>

    <!-- 🔥 ADDRESSES -->

    <div class="section">

      <div class="sectionTitle">

        Saved Addresses

      </div>

      <div id="addressList"></div>

    </div>

  </div>

</div>


<script>

const supabaseClient =
window.supabase.createClient(

  "https://izoipzriynkcjtwuzrfu.supabase.co",

  "sb_publishable_7ZRL1Y4JAppLTJonepuTIw_UQyGjVVw"

);

const mobile =
localStorage.getItem(
"userMobile"
);

const userName =
localStorage.getItem(
"userName"
);

/* 🔥 LOAD PROFILE */

async function loadProfile(){

  // 🔥 NAME
  document.getElementById(
    "userName"
  ).innerText =
  userName || "User";

  // 🔥 MOBILE
  document.getElementById(
    "userMobile"
  ).innerText =
  mobile || "";

  // 🔥 AVATAR
  document.getElementById(
    "avatar"
  ).innerText =

  (
    userName || "U"
  )
  .charAt(0)
  .toUpperCase();

  // 🔥 GET ORDERS
  const { data } =
  await supabaseClient

  .from("orders")

  .select("*")

  .eq("mobile", mobile)

  .order(
    "id",
    { ascending:false }
  );

  const addressList =
  document.getElementById(
    "addressList"
  );
  // 🔥 TOTAL
document.getElementById(
  "totalOrders"
).innerText =
data?.length || 0;

// 🔥 DELIVERED
const delivered =
data?.filter(order=>

  (
    order.status || ""
  )
  .toLowerCase()
  .includes("delivered")

).length || 0;

document.getElementById(
  "deliveredOrders"
).innerText =
delivered;

// 🔥 CANCELLED
const cancelled =
data?.filter(order=>

  (
    order.status || ""
  )
  .toLowerCase()
  .includes("cancel")

).length || 0;

document.getElementById(
  "cancelledOrders"
).innerText =
cancelled;

  // 🔥 UNIQUE ADDRESSES
  const unique =
  [];

  data?.forEach(order=>{

    if(

      order.address

      &&

      !unique.includes(
        order.address
      )

    ){

      unique.push(
        order.address
      );

    }

  });

  // 🔥 EMPTY
  if(unique.length === 0){

   addressList.innerHTML = `

  <div style="
    text-align:center;
    padding:60px 20px;
  ">

    <i class="
      fa-solid
      fa-box-open
    "
    style="
      font-size:42px;
      color:#d1d5db;
      margin-bottom:14px;
    ">
    </i>

    <div style="
      font-size:17px;
      font-weight:700;
      color:#111;
    ">

      No Orders Yet

    </div>

    <div style="
      font-size:13px;
      color:#9ca3af;
      margin-top:8px;
    ">

      Your saved addresses
      will appear here

    </div>

  </div>

`;

  }

  // 🔥 ADDRESSES
  else{

    unique.forEach(address=>{

    addressList.innerHTML += `

  <div class="addressCard">

    <div class="addressTop">

      <div class="locIcon">

        <i class="
          fa-solid
          fa-location-dot
        "></i>

      </div>

      <div>

        <div class="addressLabel">

          ${
            userName ||
            "Customer"
          }

        </div>

        <div style="
          font-size:12px;
          color:#9ca3af;
          margin-top:3px;
        ">

          ${mobile || ""}

        </div>

      </div>

    </div>

    <div
      class="addressText"
      style="
        margin-top:12px;
      "
    >

      ${address}

    </div>

  </div>

`;

    });

  }

  // 🔥 HIDE LOADER
  document.getElementById(
    "loader"
  ).style.display =
  "none";

}

/* 🔥 BACK */

function goBack(){

  sessionStorage.setItem(
    "skipIntro",
    "true"
  );

window.location.href =
"order.html";
}

loadProfile();

</script>

</body>
</html>
