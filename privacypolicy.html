html, body {

/* NAVBAR FIX */

p { font-size: 14px; color: #444; }

ul { padding-left: 18px; }

.top-image {

function setList(id, arr){
  const ul=document.getElementById(id);
  ul.innerHTML="";
  arr.forEach(i=>{
    let li=document.createElement("li");
    li.innerText=i;
    ul.appendChild(li);
  });
}

function changeLang(lang){
  const t=translations[lang];

  document.getElementById("navTitle").innerText=t.navTitle;
  document.getElementById("introText").innerText=t.intro;

  document.getElementById("dataTitle").innerText=t.dataTitle;
  setList("dataList",t.dataList);

  document.getElementById("useTitle").innerText=t.useTitle;
  setList("useList",t.useList);

  document.getElementById("locationTitle").innerText=t.locationTitle;
  document.getElementById("locationText").innerText=t.locationText;

  document.getElementById("sharingTitle").innerText=t.sharingTitle;
  setList("sharingList",t.sharingList);

  document.getElementById("securityTitle").innerText=t.securityTitle;
  document.getElementById("securityText").innerText=t.securityText;

  document.getElementById("rightsTitle").innerText=t.rightsTitle;
  setList("rightsList",t.rightsList);

  document.getElementById("contactTitle").innerText=t.contactTitle;
  document.getElementById("contactText").innerText=t.contactText;

  localStorage.setItem("appLang",lang);
}

window.onload=()=>{
  const lang=localStorage.getItem("appLang")||"en";
  document.getElementById("langSelect").value=lang;
  changeLang(lang);
};

function goBack(){ window.history.back(); }
